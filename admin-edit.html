<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CQM - Editar Canción</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080c14; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 2rem; }
    header { background: #0d1626; border-bottom: 1px solid #1e2d45; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; position: sticky; top: 0; z-index: 10; }
    .back-btn { background: none; border: none; color: #3b82f6; font-size: 1.3rem; cursor: pointer; padding: 4px; display: flex; align-items: center; }
    .header-title { font-size: 1rem; font-weight: 600; color: #e2e8f0; flex: 1; }
    .container { padding: 1.25rem; max-width: 600px; margin: 0 auto; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.75rem; color: #4a5568; margin-bottom: 0.4rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    input, select, textarea {
      width: 100%; background: #0d1626; border: 1px solid #1e2d45; border-radius: 8px;
      padding: 0.75rem 1rem; color: #e2e8f0; font-size: 0.9rem; outline: none; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: #3b82f6; }
    textarea { resize: vertical; min-height: 120px; font-family: monospace; font-size: 0.85rem; }
    .section-block { background: #0d1626; border: 1px solid #1e2d45; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
    .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; }
    .section-header select { flex: 1; }
    .del-btn { background: #1a0808; border: 1px solid #7f1d1d; color: #ef4444; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 0.8rem; }
    .move-btn { background: #1e2d45; border: none; color: #3b82f6; border-radius: 6px; padding: 6px 8px; cursor: pointer; font-size: 0.7rem; }
    .move-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .pad { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.75rem; }
    .pad-btn { background: #1e2d45; border: none; color: #3b82f6; border-radius: 6px; padding: 5px 8px; font-size: 0.8rem; font-family: monospace; font-weight: 700; cursor: pointer; }
    .pad-btn:hover { background: #3b82f6; color: #fff; }
    .add-section-btn { width: 100%; background: none; border: 1px dashed #1e2d45; border-radius: 10px; color: #4a5568; padding: 0.75rem; cursor: pointer; font-size: 0.85rem; margin-bottom: 1rem; }
    .add-section-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .save-btn { width: 100%; background: #3b82f6; border: none; border-radius: 8px; color: #fff; padding: 0.85rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-bottom: 0.75rem; }
    .save-btn:disabled { background: #1e2d45; color: #4a5568; cursor: not-allowed; }
    .delete-song-btn { width: 100%; background: #1a0808; border: 1px solid #7f1d1d; border-radius: 8px; color: #ef4444; padding: 0.85rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .mensaje { border-radius: 8px; padding: 0.7rem 1rem; font-size: 0.8rem; margin-bottom: 1rem; display: none; }
    .error { background: #1a0808; border: 1px solid #7f1d1d; color: #f87171; }
    .success { background: #0a1a0a; border: 1px solid #14532d; color: #4ade80; }
    .loading { text-align: center; color: #4a5568; padding: 2rem; }
    .section-label { font-size: 0.7rem; color: #4a5568; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <header>
    <button class="back-btn" onclick="window.location.href='/admin.html'">
      <i class="ti ti-arrow-left"></i>
    </button>
    <a href="/library.html" style="background:none;border:none;color:#4a5568;font-size:1.1rem;padding:4px;display:flex;align-items:center;text-decoration:none;">
      <i class="ti ti-home"></i>
    </a>
    <div class="header-title" id="header-title">Editar canción</div>
  </header>

  <div class="container">
    <div class="mensaje error" id="error"></div>
    <div class="mensaje success" id="success"></div>

    <div id="form-content"><div class="loading">Cargando...</div></div>
  </div>

  <script>
    const _supabase = supabase.createClient(
      'https://kzqnsbztfyhyyageuboz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6cW5zYnp0ZnloeXlhZ2V1Ym96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTgzOTQsImV4cCI6MjA5MTQ5NDM5NH0.n0scEJcx6tZ7IihDKxdr3R2LDipZhv2oDbxwLiLq53w'
    )

    const TIPOS = ['intro','verso','pre-coro','coro','bridge','instrumental','outro','tag']
  const NUMEROS = [
      '1','1m','17','1maj7','19','1maj9','1sus2','1sus4','1add2','1add4',
      '2','2m','27','2maj7','29','2maj9','2sus2','2sus4','2add2','2add4',
      '3','3m','37','3maj7','39','3maj9','3sus2','3sus4','3add2','3add4',
      '4','4m','47','4maj7','49','4maj9','4sus2','4sus4','4add2','4add4',
      '5','5m','57','5maj7','59','5maj9','5sus2','5sus4','5add2','5add4',
      '6','6m','67','6maj7','69','6maj9','6sus2','6sus4','6add2','6add4',
      '7','7m','77','7maj7','79','7maj9','7sus2','7sus4','7add2','7add4'
    ]
    const params = new URLSearchParams(window.location.search)
    const songId = params.get('id')
    let sectionCount = 0
    let existingSections = []

    async function init() {
      const { data: { session } } = await _supabase.auth.getSession()
      if (!session) { window.location.href = '/login.html'; return }
      const { data: profile } = await _supabase.from('profiles').select('is_admin').eq('id', session.user.id).single()
      if (!profile || !profile.is_admin) { window.location.href = '/library.html'; return }
      cargarCancion()
    }

    async function cargarCancion() {
      const { data: song } = await _supabase.from('Songs').select('*').eq('id', songId).single()
      if (!song) { window.location.href = '/admin.html'; return }

      document.getElementById('header-title').textContent = song.title

      const { data: secs } = await _supabase.from('sections').select('*').eq('song_id', songId).order('order')
      existingSections = secs || []

      document.getElementById('form-content').innerHTML = `
        <div class="form-row">
          <div class="form-group">
            <label>Título *</label>
            <input type="text" id="title" value="${song.title}">
          </div>
          <div class="form-group">
            <label>Artista</label>
            <input type="text" id="artist" value="${song.artist || ''}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Tono original</label>
            <select id="key">
              ${['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'].map(k =>
                `<option value="${k}" ${song['original key'] === k ? 'selected' : ''}>${k}</option>`
              ).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Slug</label>
            <input type="text" id="slug" value="${song.slug || ''}">
          </div>
        </div>
                <div class="section-label">Secciones</div>
        <div id="sections-container"></div>
        <button class="add-section-btn" onclick="addSection()">+ Agregar sección</button>
        <button class="save-btn" onclick="guardarCambios()">💾 Guardar cambios</button>
        <button class="delete-song-btn" onclick="eliminarCancion()">🗑 Eliminar canción</button>
      `

      existingSections.forEach(sec => addSection(sec))
    }

    function addSection(sec = null) {
      sectionCount++
      const id = `sec-${sectionCount}`
      const div = document.createElement('div')
      div.className = 'section-block'
      div.id = id
      div.dataset.secId = sec ? sec.id : ''
      div.innerHTML = `
        <div class="section-header">
          <span class="sec-num" style="font-size:0.8rem;color:#4a5568">#${sectionCount}</span>
          <select class="tipo-select">
            ${TIPOS.map(t => `<option value="${t}" ${sec && sec.type === t ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
          <button class="move-btn" onclick="moveSection('${id}', -1)" title="Mover arriba">&#9650;</button>
          <button class="move-btn" onclick="moveSection('${id}', 1)" title="Mover abajo">&#9660;</button>
          <button class="del-btn" onclick="document.getElementById('${id}').remove(); renumerarSecciones()">🗑</button>
        </div>
        <div class="pad">
          ${NUMEROS.map(n => `<button class="pad-btn" onclick="insertarAcorde('${id}','${n}')">[${n}]</button>`).join('')}
        </div>
        <div class="note-input-row">
          <input type="text" id="note-${id}" placeholder="Nota: ej. solo pads, toda la banda, intensidad...">
          <button onclick="insertarNota('${id}')">+ Insertar nota</button>
        </div>
        <textarea id="content-${id}">${sec ? sec.content : ''}</textarea>
      `
      document.getElementById('sections-container').appendChild(div)
      renumerarSecciones()
    }

    function moveSection(id, dir) {
      const container = document.getElementById('sections-container')
      const el = document.getElementById(id)
      if (!el) return
      if (dir === -1) {
        const prev = el.previousElementSibling
        if (prev) container.insertBefore(el, prev)
      } else {
        const next = el.nextElementSibling
        if (next) container.insertBefore(next, el)
      }
      renumerarSecciones()
    }

    function renumerarSecciones() {
      document.querySelectorAll('#sections-container .section-block').forEach((sec, idx) => {
        const numEl = sec.querySelector('.sec-num')
        if (numEl) numEl.textContent = `#${idx + 1}`
      })
    }

    function insertarAcorde(secId, acorde) {
      const ta = document.getElementById(`content-${secId}`)
      const s = ta.selectionStart, e = ta.selectionEnd
      ta.value = ta.value.slice(0, s) + `[${acorde}]` + ta.value.slice(e)
      ta.selectionStart = ta.selectionEnd = s + acorde.length + 2
      ta.focus()
    }

    function insertarNota(secId) {
      const noteInput = document.getElementById('note-' + secId)
      const nota = noteInput.value.trim()
      if (!nota) return
      const ta = document.getElementById('content-' + secId)
      const s = ta.selectionStart, e = ta.selectionEnd
      ta.value = ta.value.slice(0, s) + '[' + nota + ']' + ta.value.slice(e)
      ta.selectionStart = ta.selectionEnd = s + nota.length + 2
      ta.focus()
      noteInput.value = ''
    }

    async function guardarCambios() {
      const title = document.getElementById('title').value.trim()
      const artist = document.getElementById('artist').value.trim()
      const key = document.getElementById('key').value
      const slug = document.getElementById('slug').value.trim()
      const errorEl = document.getElementById('error')
      const successEl = document.getElementById('success')

      errorEl.style.display = 'none'
      successEl.style.display = 'none'

      if (!title) {
        errorEl.textContent = 'El título es obligatorio.'
        errorEl.style.display = 'block'
        return
      }

      const { error: songError } = await _supabase
        .from('Songs')
        .update({ title, artist, 'original key': key, slug })
        .eq('id', songId)

      if (songError) {
        errorEl.textContent = 'Error: ' + songError.message
        errorEl.style.display = 'block'
        return
      }

      await _supabase.from('sections').delete().eq('song_id', songId)

      const secciones = document.querySelectorAll('.section-block')
      const inserts = []
      secciones.forEach((sec, idx) => {
        const tipo = sec.querySelector('.tipo-select').value
        const content = sec.querySelector('textarea').value.trim()
        if (content) inserts.push({ song_id: parseInt(songId), type: tipo, content, order: idx + 1 })
      })

      if (inserts.length > 0) {
        const { error: secError } = await _supabase.from('sections').insert(inserts)
        if (secError) {
          errorEl.textContent = 'Error en secciones: ' + secError.message
          errorEl.style.display = 'block'
          return
        }
      }

      successEl.textContent = '✅ Canción actualizada exitosamente!'
      successEl.style.display = 'block'
      setTimeout(() => { window.location.href = '/admin.html' }, 1500)
    }

    async function eliminarCancion() {
      if (!confirm('¿Eliminar esta canción permanentemente?')) return
      await _supabase.from('sections').delete().eq('song_id', songId)
      await _supabase.from('Songs').delete().eq('id', songId)
      window.location.href = '/admin.html'
    }

    init()
  </script>
</body>
</html>
