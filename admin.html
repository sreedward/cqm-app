<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CQM - Admin</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080c14; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 2rem; }
    header { background: #0d1626; border-bottom: 1px solid #1e2d45; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; position: sticky; top: 0; z-index: 10; }
    .back-btn { background: none; border: none; color: #3b82f6; font-size: 1.3rem; cursor: pointer; padding: 4px; display: flex; align-items: center; }
    .header-title { font-size: 1rem; font-weight: 600; color: #e2e8f0; flex: 1; }
    .badge { background: #f97316; color: #fff; border-radius: 6px; padding: 2px 8px; font-size: 0.7rem; font-weight: 700; }
    .container { padding: 1.25rem; max-width: 600px; margin: 0 auto; }
    .tabs { display: flex; background: #0d1626; border-radius: 10px; padding: 4px; margin-bottom: 1.5rem; border: 1px solid #1e2d45; }
    .tab-btn { flex: 1; background: none; border: none; color: #4a5568; padding: 8px; font-size: 0.85rem; cursor: pointer; border-radius: 7px; font-weight: 500; }
    .tab-btn.active { background: #3b82f6; color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.75rem; color: #4a5568; margin-bottom: 0.4rem; letter-spacing: 0.5px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    input, select, textarea {
      width: 100%; background: #0d1626; border: 1px solid #1e2d45; border-radius: 8px;
      padding: 0.75rem 1rem; color: #e2e8f0; font-size: 0.9rem; outline: none; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: #3b82f6; }
    textarea { resize: vertical; min-height: 100px; font-family: monospace; font-size: 0.85rem; }
    .section-block { background: #0d1626; border: 1px solid #1e2d45; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
    .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; }
    .section-header select { flex: 1; }
    .del-btn { background: #1a0808; border: 1px solid #7f1d1d; color: #ef4444; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 0.8rem; }
    .pad { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.75rem; }
    .pad-btn { background: #1e2d45; border: none; color: #3b82f6; border-radius: 6px; padding: 5px 8px; font-size: 0.8rem; font-family: monospace; font-weight: 700; cursor: pointer; }
    .pad-btn:hover { background: #3b82f6; color: #fff; }
    .add-section-btn { width: 100%; background: none; border: 1px dashed #1e2d45; border-radius: 10px; color: #4a5568; padding: 0.75rem; cursor: pointer; font-size: 0.85rem; margin-bottom: 1rem; }
    .add-section-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .save-btn { width: 100%; background: #3b82f6; border: none; border-radius: 8px; color: #fff; padding: 0.85rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .save-btn:disabled { background: #1e2d45; color: #4a5568; cursor: not-allowed; }
    .mensaje { border-radius: 8px; padding: 0.7rem 1rem; font-size: 0.8rem; margin-bottom: 1rem; display: none; }
    .error { background: #1a0808; border: 1px solid #7f1d1d; color: #f87171; }
    .success { background: #0a1a0a; border: 1px solid #14532d; color: #4ade80; }
    .song-list-item { display: flex; align-items: center; gap: 10px; padding: 0.75rem 0; border-bottom: 1px solid #0d1626; }
    .song-list-item:last-child { border-bottom: none; }
    .song-list-info { flex: 1; }
    .song-list-title { font-size: 0.9rem; color: #e2e8f0; }
    .song-list-sub { font-size: 0.75rem; color: #4a5568; }
    .edit-btn { background: #1e2d45; border: none; color: #3b82f6; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; }
    .hint { font-size: 0.7rem; color: #4a5568; margin-top: 4px; }
    .loading { text-align: center; color: #4a5568; padding: 2rem; }
  </style>
</head>
<body>
  <header>
    <button class="back-btn" onclick="history.back()"><i class="ti ti-arrow-left"></i></button>
    <div class="header-title">Panel Admin</div>
    <span class="badge">ADMIN</span>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('nueva')">Nueva canción</button>
      <button class="tab-btn" onclick="switchTab('editar')">Editar canciones</button>
    </div>

    <!-- TAB NUEVA CANCIÓN -->
    <div class="tab-content active" id="tab-nueva">
      <div class="mensaje error" id="error-nueva"></div>
      <div class="mensaje success" id="success-nueva"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Título *</label>
          <input type="text" id="title" placeholder="Ej: Holy Forever">
        </div>
        <div class="form-group">
          <label>Artista</label>
          <input type="text" id="artist" placeholder="Ej: Chris Tomlin">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tono original *</label>
          <select id="key">
            <option value="C">C</option><option value="C#">C#</option>
            <option value="D">D</option><option value="Eb">Eb</option>
            <option value="E">E</option><option value="F">F</option>
            <option value="F#">F#</option><option value="G">G</option>
            <option value="Ab">Ab</option><option value="A">A</option>
            <option value="Bb">Bb</option><option value="B">B</option>
          </select>
        </div>
        <div class="form-group">
          <label>Slug *</label>
          <input type="text" id="slug" placeholder="holy-forever">
          <p class="hint">Se genera automático</p>
        </div>
      </div>
      <div id="sections-container"></div>
      <button class="add-section-btn" onclick="addSection()">+ Agregar sección</button>
      <button class="save-btn" id="save-btn" onclick="guardarCancion()">💾 Guardar canción</button>
    </div>

    <!-- TAB EDITAR -->
    <div class="tab-content" id="tab-editar">
      <div id="songs-list"><div class="loading">Cargando canciones...</div></div>
    </div>
  </div>

  <script>
    const _supabase = supabase.createClient(
      'https://kzqnsbztfyhyyageuboz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6cW5zYnp0ZnloeXlhZ2V1Ym96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTgzOTQsImV4cCI6MjA5MTQ5NDM5NH0.n0scEJcx6tZ7IihDKxdr3R2LDipZhv2oDbxwLiLq53w'
    )

    const TIPOS = ['intro','verso','pre-coro','coro','bridge','instrumental','outro']
  const NUMEROS = [
      '1','1m','1maj7','17','1sus2','1sus4','1maj9','19','1bm7','1aug','1dism',
      '2','2m','2maj7','27','2sus2','2sus4','2maj9','29','2bm7','2aug','2dism',
      '3','3m','3maj7','37','3sus2','3sus4','3maj9','39','3bm7','3aug','3dism',
      '4','4m','4maj7','47','4sus2','4sus4','4maj9','49','4bm7','4aug','4dism',
      '5','5m','5maj7','57','5sus2','5sus4','5maj9','59','5bm7','5aug','5dism',
      '6','6m','6maj7','67','6sus2','6sus4','6maj9','69','6bm7','6aug','6dism',
      '7','7m','7maj7','77','7sus2','7sus4','7maj9','79','7bm7','7aug','7dism'
    ]
    let sectionCount = 0

    async function init() {
      const { data: { session } } = await _supabase.auth.getSession()
      if (!session) { window.location.href = '/login.html'; return }
      const { data: profile } = await _supabase.from('profiles').select('is_admin').eq('id', session.user.id).single()
      if (!profile || !profile.is_admin) { window.location.href = '/library.html'; return }
      addSection()
      cargarCanciones()
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0 && tab === 'nueva') || (i === 1 && tab === 'editar')))
      document.getElementById('tab-nueva').classList.toggle('active', tab === 'nueva')
      document.getElementById('tab-editar').classList.toggle('active', tab === 'editar')
    }

    function addSection() {
      sectionCount++
      const id = `sec-${sectionCount}`
      const div = document.createElement('div')
      div.className = 'section-block'
      div.id = id
      div.innerHTML = `
        <div class="section-header">
          <span style="font-size:0.8rem;color:#4a5568">#${sectionCount}</span>
          <select class="tipo-select">
            ${TIPOS.map(t => `<option value="${t}">${t}</option>`).join('')}
          </select>
          <button class="del-btn" onclick="document.getElementById('${id}').remove()">🗑</button>
        </div>
        <div class="pad">
          ${NUMEROS.map(n => `<button class="pad-btn" onclick="insertarAcorde('${id}','${n}')">[${n}]</button>`).join('')}
        </div>
        <textarea id="content-${id}" placeholder="Escribe la letra. Usa los botones para insertar acordes donde está el cursor."></textarea>
      `
      document.getElementById('sections-container').appendChild(div)
    }

    function insertarAcorde(secId, acorde) {
      const ta = document.getElementById(`content-${secId}`)
      const s = ta.selectionStart, e = ta.selectionEnd
      ta.value = ta.value.slice(0, s) + `[${acorde}]` + ta.value.slice(e)
      ta.selectionStart = ta.selectionEnd = s + acorde.length + 2
      ta.focus()
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('title')?.addEventListener('input', function() {
        const slugEl = document.getElementById('slug')
        if (!slugEl.dataset.manual) {
          slugEl.value = this.value.toLowerCase()
            .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e')
            .replace(/[íìï]/g,'i').replace(/[óòö]/g,'o')
            .replace(/[úùü]/g,'u').replace(/ñ/g,'n')
            .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')
        }
      })
      document.getElementById('slug')?.addEventListener('input', function() { this.dataset.manual = 'true' })
    })

    async function guardarCancion() {
      const title = document.getElementById('title').value.trim()
      const artist = document.getElementById('artist').value.trim()
      const key = document.getElementById('key').value
      const slug = document.getElementById('slug').value.trim()
      const errorEl = document.getElementById('error-nueva')
      const successEl = document.getElementById('success-nueva')
      const btn = document.getElementById('save-btn')

      errorEl.style.display = 'none'
      successEl.style.display = 'none'

      if (!title || !slug) {
        errorEl.textContent = 'El título y el slug son obligatorios.'
        errorEl.style.display = 'block'
        return
      }

      btn.disabled = true
      btn.textContent = 'Guardando...'

      const { data: song, error: songError } = await _supabase
        .from('Songs').insert({ title, artist, 'original key': key, slug }).select().single()

      if (songError) {
        errorEl.textContent = 'Error: ' + songError.message
        errorEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = '💾 Guardar canción'
        return
      }

      const secciones = document.querySelectorAll('.section-block')
      const inserts = []
      secciones.forEach((sec, idx) => {
        const tipo = sec.querySelector('.tipo-select').value
        const content = sec.querySelector('textarea').value.trim()
        if (content) inserts.push({ song_id: song.id, type: tipo, content, order: idx + 1 })
      })

      if (inserts.length > 0) {
        const { error: secError } = await _supabase.from('sections').insert(inserts)
        if (secError) {
          errorEl.textContent = 'Error en secciones: ' + secError.message
          errorEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = '💾 Guardar canción'
          return
        }
      }

      successEl.textContent = `✅ "${title}" guardada exitosamente!`
      successEl.style.display = 'block'
      btn.disabled = false
      btn.textContent = '💾 Guardar canción'
      document.getElementById('title').value = ''
      document.getElementById('artist').value = ''
      document.getElementById('slug').value = ''
      document.getElementById('sections-container').innerHTML = ''
      sectionCount = 0
      addSection()
      cargarCanciones()
    }

    async function cargarCanciones() {
      const { data: songs } = await _supabase.from('Songs').select('*').order('title')
      const container = document.getElementById('songs-list')
      if (!songs || songs.length === 0) {
        container.innerHTML = '<div class="loading">No hay canciones todavía.</div>'
        return
      }
      container.innerHTML = songs.map(s => `
        <div class="song-list-item">
          <div class="song-list-info">
            <div class="song-list-title">${s.title}</div>
            <div class="song-list-sub">${s.artist || 'Sin artista'} · ${s['original key'] || '?'}</div>
          </div>
          <button class="edit-btn" onclick="window.location.href='/admin-edit.html?id=${s.id}'">
            <i class="ti ti-edit"></i> Editar
          </button>
        </div>
      `).join('')
    }

    init()
  </script>
</body>
</html>
