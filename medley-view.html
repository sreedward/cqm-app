<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080c14; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 80px; }
header { background: #0d1626; border-bottom: 1px solid #1e2d45; padding: 0.85rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; position: sticky; top: 0; z-index: 10; }
.back-btn { background: none; border: none; color: #3b82f6; font-size: 1.3rem; cursor: pointer; padding: 4px; display: flex; align-items: center; }
.header-info { flex: 1; }
.medley-title { font-size: 0.95rem; font-weight: 600; color: #e2e8f0; }
.medley-sub { font-size: 0.72rem; color: #4a5568; }
.transpose-bar { background: #0d1626; border-bottom: 1px solid #1e2d45; padding: 0.5rem 1.25rem; display: flex; flex-direction: column; gap: 0.45rem; position: sticky; top: 57px; z-index: 9; }
.transpose-row { display: flex; align-items: center; gap: 0.65rem; }
.t-label { font-size: 0.72rem; color: #4a5568; white-space: nowrap; }
.t-btn { background: #1e2d45; border: none; color: #e2e8f0; border-radius: 6px; width: 28px; height: 28px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.t-btn:hover { background: #3b82f6; }
.key-display { background: #1e2d45; color: #3b82f6; border-radius: 6px; padding: 3px 10px; font-size: 0.85rem; font-weight: 700; font-family: monospace; min-width: 36px; text-align: center; }
.key-select-wrap { display: flex; align-items: center; gap: 0.5rem; flex: 1; }
.key-select { background: #1e2d45; border: 1px solid #2a3a50; color: #e2e8f0; border-radius: 6px; padding: 4px 8px; font-size: 0.82rem; font-family: monospace; font-weight: 700; cursor: pointer; flex: 1; max-width: 130px; }
.key-select:focus { outline: none; border-color: #3b82f6; }
.apply-key-btn { background: #3b82f6; border: none; color: #fff; border-radius: 6px; padding: 4px 10px; font-size: 0.75rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
.apply-key-btn:hover { background: #2563eb; }
.cifrado-toggle { margin-left: auto; display: flex; background: #1e2d45; border-radius: 6px; overflow: hidden; }
.cifrado-btn { background: none; border: none; color: #4a5568; padding: 4px 10px; font-size: 0.72rem; cursor: pointer; font-weight: 700; }
.cifrado-btn.active { background: #3b82f6; color: #fff; }
.content { padding: 1rem 1.25rem 2rem; }
.sec-block { border-radius: 10px; padding: 0.85rem 1rem; margin-bottom: 1rem; }
.sec-block.intro { background: #0a1f12; border-left: 3px solid #22c55e; }
.sec-block.verso { background: #0a1226; border-left: 3px solid #3b82f6; }
.sec-block.pre-coro { background: #1f120a; border-left: 3px solid #f97316; }
.sec-block.coro { background: #130a26; border-left: 3px solid #a855f7; }
.sec-block.bridge { background: #1f1a0a; border-left: 3px solid #f59e0b; }
.sec-block.instrumental { background: #141414; border-left: 3px solid #555; }
.sec-block.outro { background: #1f0a0a; border-left: 3px solid #ef4444; }
.sec-block.tag { background: #1f0a18; border-left: 3px solid #ec4899; }
.sec-block.default { background: #0d1626; border-left: 3px solid #64748b; }
.sec-song-label { font-size: 0.62rem; color: #4a5568; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.sec-type-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.75rem; }
.sec-block.intro .sec-type-label { color: #22c55e; }
.sec-block.verso .sec-type-label { color: #3b82f6; }
.sec-block.pre-coro .sec-type-label { color: #f97316; }
.sec-block.coro .sec-type-label { color: #a855f7; }
.sec-block.bridge .sec-type-label { color: #f59e0b; }
.sec-block.instrumental .sec-type-label { color: #888; }
.sec-block.outro .sec-type-label { color: #ef4444; }
.sec-block.tag .sec-type-label { color: #ec4899; }
.sec-block.default .sec-type-label { color: #64748b; }
.line { margin-bottom: 0.75rem; overflow-x: auto; }
.chords { font-size: 1rem; font-weight: 700; color: #facc15; letter-spacing: 2px; margin-bottom: 3px; font-family: monospace; }
.chord-root { display: inline-block; position: relative; white-space: nowrap; padding-right: 0.1em; }
.chord-qual { font-size: 0.65em; font-weight: 700; position: absolute; top: -0.05em; left: 100%; line-height: 1; letter-spacing: 0; white-space: nowrap; }
.lyrics { font-size: 0.95rem; color: #cbd5e1; line-height: 1.5; }
.loading { text-align: center; color: #4a5568; padding: 3rem; }
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0d1626; border-top: 1px solid #1e2d45; display: flex; padding: 8px 0 12px; z-index: 20; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; text-decoration: none; }
.nav-item i { font-size: 1.2rem; color: #4a5568; }
.nav-item span { font-size: 0.6rem; color: #4a5568; letter-spacing: 0.5px; }
.nav-item.active i, .nav-item.active span { color: #3b82f6; }
.divider { display: flex; align-items: center; gap: 8px; margin: 0.5rem 0 1rem; }
.divider-line { flex: 1; height: 1px; background: #1e2d45; }
</style>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(e => console.error('[SW]', e));
  });
}
</script>
</head>
<body>
<header>
  <button class="back-btn" onclick="history.back()"><i class="ti ti-arrow-left"></i></button>
  <div class="header-info">
    <div class="medley-title" id="medley-title">Cargando...</div>
    <div class="medley-sub" id="medley-sub"></div>
  </div>
</header>
<div class="transpose-bar">
  <div class="transpose-row">
    <span class="t-label">Semit.:</span>
    <button class="t-btn" onclick="transposeRel(-1)"><i class="ti ti-minus"></i></button>
    <div class="key-display" id="key-display">-</div>
    <button class="t-btn" onclick="transposeRel(1)"><i class="ti ti-plus"></i></button>
    <div class="cifrado-toggle">
      <button class="cifrado-btn active" id="btn-am" onclick="setCifrado('americano')">Am</button>
      <button class="cifrado-btn" id="btn-nns" onclick="setCifrado('nashville')">NNS</button>
    </div>
  </div>
  <div class="transpose-row">
    <span class="t-label">Nota:</span>
    <div class="key-select-wrap">
      <select class="key-select" id="target-key">
        <option value="">-- Elegir nota --</option>
        <option value="C">C</option>
        <option value="C#">C#</option>
        <option value="D">D</option>
        <option value="D#">D# / Eb</option>
        <option value="E">E</option>
        <option value="F">F</option>
        <option value="F#">F# / Gb</option>
        <option value="G">G</option>
        <option value="G#">G# / Ab</option>
        <option value="A">A</option>
        <option value="A#">A# / Bb</option>
        <option value="B">B</option>
      </select>
      <button class="apply-key-btn" onclick="applyTargetKey()"><i class="ti ti-arrow-right" style="font-size:0.8rem"></i> Aplicar</button>
    </div>
  </div>
</div>
<div class="content" id="content">
  <div class="loading">Cargando medley...</div>
</div>
<nav class="bottom-nav">
  <a class="nav-item" href="/library.html"><i class="ti ti-home"></i><span>Inicio</span></a>
  <a class="nav-item" href="/setlist.html"><i class="ti ti-list-check"></i><span>Setlist</span></a>
  <a class="nav-item active" href="/medleys.html"><i class="ti ti-layers-intersect"></i><span>Medley</span></a>
  <a class="nav-item" href="/more.html"><i class="ti ti-dots-circle-horizontal"></i><span>Más</span></a>
</nav>
<script>
const _sb = supabase.createClient(
  'https://kzqnsbztfyhyyageuboz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6cW5zYnp0ZnloeXlhZ2V1Ym96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTgzOTQsImV4cCI6MjA5MTQ5NDM5NH0.n0scEJcx6tZ7IihDKxdr3R2LDipZhv2oDbxwLiLq53w'
);
const NOTAS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BEMOLES = {'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#'};
let semitones = 0;
let cifrado   = 'americano';
let baseKey   = 'C';
let allSections = [];
const params   = new URLSearchParams(window.location.search);
const medleyId = params.get('id');

function noteToIdx(note) {
  const n = BEMOLES[note] || note;
  return NOTAS.indexOf(n);
}

function transposeChord(chord, shift) {
  if (!chord || !chord.trim()) return chord;
  var re = new RegExp('^([A-G][#b]?)(.*?)(/[A-G][#b]?)?$');
  var m  = chord.trim().match(re);
  if (!m) return chord;
  var root    = m[1];
  var quality = m[2] || '';
  var slash   = m[3] || '';
  var rootIdx = noteToIdx(root);
  if (rootIdx === -1) return chord;
  var newRoot = NOTAS[(rootIdx + shift + 120) % 12];
  var result  = newRoot + quality;
  if (slash) {
    var bassNote = slash.slice(1);
    var bassIdx  = noteToIdx(bassNote);
    result += (bassIdx !== -1) ? '/' + NOTAS[(bassIdx + shift + 120) % 12] : slash;
  }
  return result;
}

function styledChord(chord) {
  if (!chord || !chord.trim()) return '';
  var t = chord.trim();
  var nns = t.match(/^([b#]?[1-7])(.+)$/);
  if (nns) {
    return '<span class="chord-root">' + nns[1] + '<span class="chord-qual">' + nns[2] + '</span></span>';
  }
  if (/^[b#]?[1-7]$/.test(t)) return '<span>' + t + '</span>';
  var am = t.match(/^([A-G][#b]?)(.+)$/);
  if (am) {
    return '<span class="chord-root">' + am[1] + '<span class="chord-qual">' + am[2] + '</span></span>';
  }
  return '<span>' + t + '</span>';
}
function procesarToken(token) {
  if (!token.trim()) return token;
  if (cifrado === 'nashville') return token;
  return transposeChord(token, semitones);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function procesarLinea(line) {
  if (!line || !line.trim()) return '';
  if (line.indexOf('[') === -1) {
    return '<div class="line"><div class="lyrics">' + escHtml(line) + '</div></div>';
  }
  var bracketRe = new RegExp('(\\[[^\\]]*\\])', 'g');
  var parts2 = line.split(bracketRe);
  var cells = [];
  var pendingChord = null;
  for (var pi = 0; pi < parts2.length; pi++) {
    var tok = parts2[pi];
    if (tok.charAt(0) === '[' && tok.charAt(tok.length-1) === ']') {
      pendingChord = procesarToken(tok.slice(1, -1).trim());
    } else {
      var words = tok.split(' ');
      for (var wi = 0; wi < words.length; wi++) {
        if (wi === 0 && pendingChord !== null) {
          cells.push({ chord: pendingChord, lyric: words[wi] });
          pendingChord = null;
        } else {
          cells.push({ chord: '', lyric: words[wi] });
        }
      }
    }
  }
  var hasLyrics = cells.some(function(c) { return c.lyric.trim() !== ''; });
  if (!hasLyrics) {
    var chordLine = cells.filter(function(c){return c.chord;}).map(function(c){return c.chord;}).join('  ');
    return '<div class="line"><div class="chords">' + chordLine + '</div></div>';
  }
  var html = cells.map(function(c) {
    return '<span style="display:inline-block;vertical-align:bottom;text-align:left;margin-right:4px">' +
      '<span style="display:block;font-family:monospace;font-size:1rem;font-weight:700;color:#facc15;min-height:1.3em;white-space:pre">' + (c.chord ? styledChord(c.chord) + ' ' : ' ') + '</span>' +
      '<span style="display:block;font-size:0.95rem;color:#cbd5e1;white-space:pre">' + escHtml(c.lyric || ' ') + '</span></span>';
  }).join('');
  return '<div class="line" style="line-height:1;margin-bottom:0.75rem;overflow-x:auto">' + html + '</div>';
}

function renderSeccion(sec) {
  var lines     = (sec.content || '').split('\n');
  var linesHTML = lines.map(procesarLinea).filter(Boolean).join('');
  var tipo      = (sec.type || 'default').toLowerCase().split(' ').join('-');
  var valid     = ['intro','verso','pre-coro','coro','bridge','instrumental','outro','tag'];
  var cssClass  = valid.indexOf(tipo) !== -1 ? tipo : 'default';
  return '<div class="sec-block ' + cssClass + '">' +
    '<div class="sec-song-label">' + escHtml(sec.songTitle) + '</div>' +
    '<div class="sec-type-label">' + escHtml(sec.type) + '</div>' +
    linesHTML + '</div>';
}

function getCurrentKey() {
  return NOTAS[(noteToIdx(baseKey) + semitones + 120) % 12];
}

function renderAll() {
  var el = document.getElementById('content');
  if (!allSections.length) { el.innerHTML = '<div class="loading">Sin secciones.</div>'; return; }
  var html = '';
  var prevSong = null;
  allSections.forEach(function(sec, idx) {
    if (sec.songTitle !== prevSong) {
      if (idx > 0) html += '<div class="divider"><div class="divider-line"></div></div>';
      prevSong = sec.songTitle;
    }
    html += renderSeccion(sec);
  });
  el.innerHTML = html;
  document.getElementById('key-display').textContent = getCurrentKey();
}

function transposeRel(n) {
  semitones = (semitones + n + 12) % 12;
  renderAll();
}

function applyTargetKey() {
  var sel = document.getElementById('target-key').value;
  if (!sel) return;
  var targetIdx = noteToIdx(sel);
  var baseIdx   = noteToIdx(baseKey);
  if (targetIdx === -1 || baseIdx === -1) return;
  semitones = (targetIdx - baseIdx + 12) % 12;
  renderAll();
}

function setCifrado(tipo) {
  cifrado = tipo;
  document.getElementById('btn-am').classList.toggle('active', tipo === 'americano');
  document.getElementById('btn-nns').classList.toggle('active', tipo === 'nashville');
  renderAll();
}

async function init() {
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) { window.location.href = '/login.html'; return; }
  if (!medleyId) { window.location.href = '/medley-builder.html'; return; }
  const { data: medley, error: mErr } = await _sb.from('medleys').select('*').eq('id', medleyId).single();
  if (mErr || !medley) { window.location.href = '/medley-builder.html'; return; }
  document.getElementById('medley-title').textContent = medley.name;
  document.title = 'CQM - ' + medley.name;
  const { data: mSecs, error: msErr } = await _sb.from('medley_sections')
    .select('id, section_id, song_id, order').eq('medley_id', medleyId).order('order');
  if (msErr || !mSecs || !mSecs.length) {
    document.getElementById('content').innerHTML = '<div class="loading">Este medley está vacío.</div>';
    return;
  }
  const secIds  = mSecs.map(s => s.section_id);
  const songIds = [...new Set(mSecs.map(s => s.song_id))];
  const [{ data: sections }, { data: songs }] = await Promise.all([
    _sb.from('sections').select('id, type, content, song_id').in('id', secIds),
    _sb.from('Songs').select('id, title, "original key"').in('id', songIds)
  ]);
  const secsMap  = {};  (sections || []).forEach(s => secsMap[s.id]  = s);
  const songsMap = {};  (songs    || []).forEach(s => songsMap[s.id] = s);
  const firstSongId = mSecs[0].song_id;
  if (songsMap[firstSongId]) {
    const rawKey = songsMap[firstSongId]['original key'] || 'C';
    baseKey = BEMOLES[rawKey] || rawKey;
  }
  allSections = mSecs.map(ms => {
    const sec  = secsMap[ms.section_id]  || {};
    const song = songsMap[ms.song_id]    || {};
    return Object.assign({}, sec, { songTitle: song.title || 'Canción', songKey: song['original key'] || 'C' });
  });
  const totalSongs = new Set(allSections.map(s => s.songTitle)).size;
  document.getElementById('medley-sub').textContent = allSections.length + ' secciones · ' + totalSongs + ' canciones';
  renderAll();
}
init();
</script>
</body>
</html>
