<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChartQuick by Musishens</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }
    .logo span { color: #f59e0b; }
    .tagline {
      font-size: 1rem;
      color: #888;
      margin-bottom: 3rem;
    }
    .coming-soon {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .coming-soon h2 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }
    .coming-soon p {
      color: #888;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="logo">Chart<span>Quick</span></div>
  <p class="tagline">by Musishens</p>
  <div class="coming-soon">
    <h2>🎸 Próximamente</h2>
    <p>Tu app de acordes para tocar en vivo</p>
  </div>
</body>
</html>
