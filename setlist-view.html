<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#080c14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080c14;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    header {
      background: #0d1626;
      border-bottom: 1px solid #1e2d45;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-btn {
      background: none;
      border: none;
      color: #3b82f6;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .header-info { flex: 1; }
    .setlist-title { font-size: 0.95rem; font-weight: 600; color: #e2e8f0; }
    .setlist-date { font-size: 0.75rem; color: #4a5568; }
    .start-btn {
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .section-label {
      font-size: 0.7rem;
      color: #4a5568;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0.75rem 1.25rem 0.25rem;
    }
    .songs-list { padding: 0 1.25rem 1rem; }
    .song-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0.75rem 0;
      border-bottom: 1px solid #0d1626;
    }
    .song-card:last-child { border-bottom: none; }
    .song-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1e2d45;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #3b82f6;
      font-weight: 700;
      flex-shrink: 0;
    }
    .song-num.active-song {
      background: #3b82f6;
      color: #fff;
    }
    .song-info { flex: 1; cursor: pointer; }
    .song-title { font-size: 0.9rem; font-weight: 500; color: #e2e8f0; margin-bottom: 2px; }
    .song-artist { font-size: 0.75rem; color: #4a5568; }
    .song-key {
      font-size: 0.7rem;
      color: #3b82f6;
      font-weight: 700;
      background: #1e2d45;
      border-radius: 4px;
      padding: 2px 7px;
      font-family: monospace;
    }
        .key-override { background: #1e3a1e; color: #4ade80; }
    .remove-btn {
      background: none;
      border: none;
      color: #4a5568;
      font-size: 1rem;
      cursor: pointer;
      padding: 4px;
    }
    .remove-btn:hover { color: #ef4444; }
    .empty {
      text-align: center;
      color: #4a5568;
      padding: 4rem 2rem;
    }
    .empty i { font-size: 3rem; display: block; margin-bottom: 1rem; }
    .empty p { font-size: 0.9rem; margin-bottom: 1.5rem; }
    .empty-btn {
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 20px;
      cursor: pointer;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0d1626;
      border-top: 1px solid #1e2d45;
      display: flex;
      padding: 8px 0 12px;
      z-index: 20;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 4px 0;
      text-decoration: none;
    }
    .nav-item i { font-size: 1.2rem; color: #4a5568; }
    .nav-item span { font-size: 0.6rem; color: #4a5568; letter-spacing: 0.5px; }
    .nav-item.active i { color: #3b82f6; }
    .nav-item.active span { color: #3b82f6; }
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2d45;
      border: 1px solid #3b82f6;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 0.6rem 1.25rem;
      font-size: 0.85rem;
      z-index: 60;
      display: none;
      white-space: nowrap;
    }
    .loading { text-align: center; color: #4a5568; padding: 3rem; }
    .show-banner {
      background: #0d1a2d;
      border: 1px solid #1e2d45;
      border-radius: 12px;
      margin: 0.75rem 1.25rem;
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .show-banner-text { font-size: 0.8rem; color: #4a5568; }
    .show-banner-text span { color: #3b82f6; font-weight: 600; }
    .play-btn {
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
  
    .drag-handle {
      color: #2a3a50;
      cursor: grab;
      padding: 4px 6px 4px 0;
      font-size: 1.1rem;
      flex-shrink: 0;
      touch-action: none;
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .song-card { transition: opacity 0.15s; }
    .song-card.dragging {
      opacity: 0.35;
      background: #111c2e;
      border-radius: 8px;
    }
    .song-card.drag-over {
      border-top: 2px solid #3b82f6;
    }
  </style>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(e => console.error('[SW]', e));
      });
    }
  </script>
</head>
<body>
  <header>
    <button class="back-btn" onclick="window.location.href='/setlist.html'">
      <i class="ti ti-arrow-left"></i>
    </button>
    <div class="header-info">
      <div class="setlist-title" id="setlist-title">Cargando...</div>
      <div class="setlist-date" id="setlist-date"></div>
    </div>
    <button onclick="eliminarSetlist()" style="background:none;border:1px solid #7f1d1d;border-radius:8px;color:#ef4444;padding:5px 10px;font-size:0.8rem;cursor:pointer">
      <i class="ti ti-trash"></i>
    </button>
  </header>

  <div id="contenido">
    <div class="loading">Cargando...</div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="/library.html">
      <i class="ti ti-music"></i>
      <span>Canciones</span>
    </a>
    <a class="nav-item active" href="/setlist.html">
      <i class="ti ti-list-check"></i>
      <span>Setlist</span>
    </a>
    <a class="nav-item" href="/more.html">
      <i class="ti ti-dots-circle-horizontal"></i>
      <span>MГѓВѓГ‚ВЎs</span>
    </a>
  </nav>

  <div class="toast" id="toast"></div>

  <script>
    const _supabase = supabase.createClient(
      'https://kzqnsbztfyhyyageuboz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6cW5zYnp0ZnloeXlhZ2V1Ym96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTgzOTQsImV4cCI6MjA5MTQ5NDM5NH0.n0scEJcx6tZ7IihDKxdr3R2LDipZhv2oDbxwLiLq53w'
    )
async function eliminarSetlist() {
      if (!confirm('ГѓВ‚Г‚ВїEliminar este setlist completo?')) return
      await _supabase.from('setlist_songs').delete().eq('setlist_id', setlistId)
      await _supabase.from('setlist').delete().eq('id', setlistId)
      window.location.href = '/setlist.html'
    }
    const params = new URLSearchParams(window.location.search)
    const setlistId = params.get('id')
    let songsOrdered = []

    async function init() {
      const { data: { session } } = await _supabase.auth.getSession()
      if (!session) { window.location.href = '/login.html'; return }
      cargarSetlist()
    }

    async function cargarSetlist() {
      const { data: setlist } = await _supabase
        .from('setlist')
        .select('*')
        .eq('id', setlistId)
        .single()

      if (!setlist) { window.location.href = '/setlist.html'; return }

      document.getElementById('setlist-title').textContent = setlist.name
      document.title = setlist.name

      if (setlist.date) {
        const fecha = new Date(setlist.date).toLocaleDateString('es-MX', {
          weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
        })
        document.getElementById('setlist-date').textContent = fecha
      }

      const { data: setlistSongs } = await _supabase
        .from('setlist_songs')
                .select('id, order, song_id, key_override')
        .eq('setlist_id', setlistId)
        .order('order')

      if (!setlistSongs || setlistSongs.length === 0) {
        document.getElementById('contenido').innerHTML = `
          <div class="empty">
            <i class="ti ti-music-off"></i>
            <p>Este setlist estГѓВѓГ‚ВЎ vacГѓВѓГ‚В­o.<br>Agrega canciones desde la biblioteca.</p>
            <button class="empty-btn" onclick="window.location.href='/library.html'">Ir a Biblioteca</button>
          </div>`
        return
      }

      const songIds = setlistSongs.map(s => s.song_id)
      const { data: songs } = await _supabase
        .from('Songs')
        .select('id, title, artist, "original key"')
        .in('id', songIds)

      const songsMap = {}
      songs.forEach(s => songsMap[s.id] = s)

      songsOrdered = setlistSongs.map(s => ({
        itemId: s.id,
        order: s.order,
                keyOverride: s.key_override,
        ...songsMap[s.song_id]
      })).filter(s => s.id)

      renderLista()
    }

    function renderLista() {
      const songIds = songsOrdered.map(s => s.id).join(',')

      let html = `
        <div class="show-banner">
          <div class="show-banner-text">
<span>${songsOrdered.length} ${songsOrdered.length === 1 ? 'canciГѓВѓГ‚Віn' : 'canciones'}</span> en este setlist
          </div>
          <button class="play-btn" onclick="iniciarShow(0)">
            <i class="ti ti-player-play"></i> Iniciar show
          </button>
        </div>
        <div class="section-label">Canciones</div>
        <div class="songs-list">`

      songsOrdered.forEach((song, idx) => {
        html += `
          <div class="song-card" draggable="true" data-item-id="${song.itemId}" data-index="${idx}">
            <div class="drag-handle" title="Arrastrar para reordenar">&#9776;</div>
            <div class="song-num">${idx + 1}</div>
            <div class="song-info" onclick="iniciarShow(${idx})">
              <div class="song-title">${song.title}</div>
              <div class="song-artist">${song.artist || 'Artista desconocido'}</div>
            </div>
            <div class="song-key${song.keyOverride ? ' key-override' : ''}">${song.keyOverride || song['original key'] || '?'}</div>
            <button class="remove-btn" onclick="eliminarCancion(${song.itemId}, '${song.title}')">
              <i class="ti ti-trash"></i>
            </button>
          </div>`
      })

      html += `</div>`
      document.getElementById('contenido').innerHTML = html
      initDragDrop()
    }

    function iniciarShow(index) {
      const songIds    = songsOrdered.map(s => s.id).join(',')
      const itemIds    = songsOrdered.map(s => s.itemId).join(',')
      const songId     = songsOrdered[index].id
      const itemId     = songsOrdered[index].itemId
      const allKeys    = songsOrdered.map(s => s.keyOverride || '').join(',')
      const keyForSong = songsOrdered[index].keyOverride || ''
      window.location.href = '/song.html?id=' + songId + '&setlist=' + setlistId + '&index=' + index + '&songs=' + songIds + '&itemids=' + itemIds + '&itemid=' + itemId + '&keys=' + encodeURIComponent(allKeys) + '&key=' + encodeURIComponent(keyForSong)
    }

    async function eliminarCancion(itemId, titulo) {
      if (!confirm(`ГѓВ‚Г‚ВїQuitar "${titulo}" del setlist?`)) return
      const { error } = await _supabase
        .from('setlist_songs')
        .delete()
        .eq('id', itemId)

      if (error) {
        mostrarToast('Error al eliminar')
      } else {
        mostrarToast(`ГѓВўГ‚ВњГ‚В“ "${titulo}" eliminado`)
        cargarSetlist()
      }
    }

    function mostrarToast(msg) {
      const toast = document.getElementById('toast')
      toast.textContent = msg
      toast.style.display = 'block'
      setTimeout(() => { toast.style.display = 'none' }, 2500)
    }

    function initDragDrop() {
      const lista = document.querySelector('.songs-list')
      if (!lista) return
      let dragSrc = null

      lista.addEventListener('dragstart', e => {
        const card = e.target.closest('.song-card')
        if (!card) return
        dragSrc = card
        card.classList.add('dragging')
        e.dataTransfer.effectAllowed = 'move'
        e.dataTransfer.setData('text/plain', card.dataset.index)
      })

      lista.addEventListener('dragend', e => {
        const card = e.target.closest('.song-card')
        if (card) card.classList.remove('dragging')
        lista.querySelectorAll('.song-card').forEach(c => c.classList.remove('drag-over'))
      })

      lista.addEventListener('dragover', e => {
        e.preventDefault()
        e.dataTransfer.dropEffect = 'move'
        const card = e.target.closest('.song-card')
        lista.querySelectorAll('.song-card').forEach(c => c.classList.remove('drag-over'))
        if (card && card !== dragSrc) card.classList.add('drag-over')
      })

      lista.addEventListener('drop', e => {
        e.preventDefault()
        const card = e.target.closest('.song-card')
        if (!card || card === dragSrc) return
        lista.querySelectorAll('.song-card').forEach(c => c.classList.remove('drag-over'))

        const cards = [...lista.querySelectorAll('.song-card')]
        const srcIdx = cards.indexOf(dragSrc)
        const tgtIdx = cards.indexOf(card)

        // Reorder songsOrdered array
        const moved = songsOrdered.splice(srcIdx, 1)[0]
        songsOrdered.splice(tgtIdx, 0, moved)

        // Re-render and save
        renderLista()
        initDragDrop()
        guardarOrden()
      })

      // ГўВ”ВЂГўВ”ВЂ Touch support for mobile ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
      let touchCard = null, touchClone = null, touchStartY = 0

      lista.addEventListener('touchstart', e => {
        const handle = e.target.closest('.drag-handle')
        if (!handle) return
        touchCard = handle.closest('.song-card')
        if (!touchCard) return
        touchStartY = e.touches[0].clientY
        touchCard.classList.add('dragging')

        touchClone = touchCard.cloneNode(true)
        touchClone.style.cssText = 'position:fixed;left:0;right:0;z-index:9999;opacity:0.85;background:#111c2e;border-radius:8px;pointer-events:none;'
        touchClone.style.top = touchCard.getBoundingClientRect().top + 'px'
        document.body.appendChild(touchClone)
        e.preventDefault()
      }, { passive: false })

      lista.addEventListener('touchmove', e => {
        if (!touchCard) return
        const dy = e.touches[0].clientY - touchStartY
        touchClone.style.top = (touchCard.getBoundingClientRect().top + dy) + 'px'

        const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY)
        const over = el?.closest('.song-card')
        lista.querySelectorAll('.song-card').forEach(c => c.classList.remove('drag-over'))
        if (over && over !== touchCard) over.classList.add('drag-over')
        e.preventDefault()
      }, { passive: false })

      lista.addEventListener('touchend', e => {
        if (!touchCard) return
        if (touchClone) { touchClone.remove(); touchClone = null }
        touchCard.classList.remove('dragging')

        const el = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY)
        const target = el?.closest('.song-card')
        lista.querySelectorAll('.song-card').forEach(c => c.classList.remove('drag-over'))

        if (target && target !== touchCard) {
          const cards = [...lista.querySelectorAll('.song-card')]
          const srcIdx = cards.indexOf(touchCard)
          const tgtIdx = cards.indexOf(target)
          const moved = songsOrdered.splice(srcIdx, 1)[0]
          songsOrdered.splice(tgtIdx, 0, moved)
          renderLista()
          initDragDrop()
          guardarOrden()
        }
        touchCard = null
      })
    }

    async function guardarOrden() {
      // UPDATE bloqueado por RLS вЂ” usar DELETE + INSERT para cada canciГіn
      for (let idx = 0; idx < songsOrdered.length; idx++) {
        const song = songsOrdered[idx]
        const { data: current } = await _supabase
          .from('setlist_songs').select('*').eq('id', song.itemId).single()
        if (!current) continue
        await _supabase.from('setlist_songs').delete().eq('id', song.itemId)
        const { data: inserted } = await _supabase.from('setlist_songs').insert({
          setlist_id:   current.setlist_id,
          song_id:      current.song_id,
          key_override: current.key_override,
          order:        idx + 1
        }).select().single()
        if (inserted) songsOrdered[idx].itemId = inserted.id
      }
      mostrarToast('Orden guardado')
    }

    init()
  </script>
</body>
</html>
