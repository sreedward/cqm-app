<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#080c14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CQM">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>CQM - Canción</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080c14;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    header {
      background: #0d1626;
      border-bottom: 1px solid #1e2d45;
      padding: 0.85rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-btn { background: none; border: none; color: #3b82f6; font-size: 1.3rem; cursor: pointer; padding: 4px; display: flex; align-items: center; }
    .header-info { flex: 1; }
    .song-title { font-size: 0.95rem; font-weight: 600; color: #e2e8f0; }
    .song-artist { font-size: 0.75rem; color: #4a5568; }
    .add-setlist-btn { background: none; border: 1px solid #1e2d45; border-radius: 8px; color: #4a5568; font-size: 0.72rem; padding: 5px 10px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .add-setlist-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .transpose-bar { background: #0d1626; border-bottom: 1px solid #1e2d45; padding: 0.6rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; position: sticky; top: 57px; z-index: 9; }
    .t-label { font-size: 0.75rem; color: #4a5568; }
    .t-btn { background: #1e2d45; border: none; color: #e2e8f0; border-radius: 6px; width: 28px; height: 28px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .t-btn:hover { background: #3b82f6; }
    .key-display { background: #1e2d45; color: #3b82f6; border-radius: 6px; padding: 3px 10px; font-size: 0.85rem; font-weight: 700; font-family: monospace; min-width: 36px; text-align: center; }
    .cifrado-toggle { margin-left: auto; display: flex; background: #1e2d45; border-radius: 6px; overflow: hidden; }
    .cifrado-btn { background: none; border: none; color: #4a5568; padding: 4px 10px; font-size: 0.72rem; cursor: pointer; font-weight: 700; }
    .cifrado-btn.active { background: #3b82f6; color: #fff; }
    .page { display: none; padding: 1rem 1.25rem 2rem; }
    .page.active { display: block; }
    .section { border-radius: 10px; padding: 0.85rem 1rem; margin-bottom: 0.85rem; }
    .section-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.75rem; }
    .section.intro { background: #0a1f12; border-left: 3px solid #22c55e; }
    .section.intro .section-label { color: #22c55e; }
    .section.verso { background: #0a1226; border-left: 3px solid #3b82f6; }
    .section.verso .section-label { color: #3b82f6; }
    .section.pre-coro { background: #1f120a; border-left: 3px solid #f97316; }
    .section.pre-coro .section-label { color: #f97316; }
    .section.coro { background: #130a26; border-left: 3px solid #a855f7; }
    .section.coro .section-label { color: #a855f7; }
    .section.bridge { background: #1f1a0a; border-left: 3px solid #f59e0b; }
    .section.bridge .section-label { color: #f59e0b; }
    .section.instrumental { background: #141414; border-left: 3px solid #555; }
    .section.instrumental .section-label { color: #555; }
    .section.outro { background: #1f0a0a; border-left: 3px solid #ef4444; }
    .section.outro .section-label { color: #ef4444; }
    .line { margin-bottom: 0.75rem; overflow-x: auto; padding-top: 0.4em; }
    .chords { font-size: 1rem; font-weight: 700; color: #facc15; letter-spacing: 2px; margin-bottom: 3px; font-family: monospace; }
.chord-root { display: inline-block; white-space: nowrap; }
.chord-qual { font-size: 0.83em; font-weight: 700; position: relative; top: -0.35em; line-height: 1; letter-spacing: 0; white-space: nowrap; margin-left: 0.05em; }
    .lyrics { font-size: 0.95rem; color: #cbd5e1; line-height: 1.5; }
    .fab { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #3b82f6; color: #fff; border: none; border-radius: 20px; padding: 0.7rem 1.75rem; font-size: 0.85rem; font-weight: 600; cursor: pointer; z-index: 20; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .page-indicator { position: fixed; bottom: 1.5rem; right: 1.25rem; background: #0d1626; border: 1px solid #1e2d45; color: #4a5568; border-radius: 20px; padding: 4px 10px; font-size: 0.7rem; z-index: 20; }
    .setlist-nav { position: fixed; bottom: 4rem; left: 0; right: 0; display: none; justify-content: space-between; padding: 0 1.25rem; z-index: 19; }
    .setlist-nav.show { display: flex; }
    .nav-song-btn { background: #0d1626; border: 1px solid #1e2d45; border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .nav-song-btn.prev { color: #4a5568; }
    .nav-song-btn.next { color: #3b82f6; font-weight: 600; }
    .loading { text-align: center; color: #4a5568; padding: 3rem; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #0d1626; border: 1px solid #1e2d45; border-radius: 16px 16px 0 0; padding: 1.5rem; width: 100%; max-width: 480px; }
    .modal h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; color: #e2e8f0; }
    .modal-cancel { width: 100%; background: #1e2d45; border: none; border-radius: 8px; color: #888; padding: 0.75rem; font-size: 0.9rem; cursor: pointer; margin-top: 1rem; }
    .setlist-opcion { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid #1e2d45; cursor: pointer; }
    .setlist-opcion:last-child { border-bottom: none; }
    .opcion-name { font-size: 0.9rem; color: #e2e8f0; }
    .opcion-date { font-size: 0.75rem; color: #4a5568; }
    .opcion-add { color: #3b82f6; font-size: 1.2rem; }
    .toast { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%); background: #1e2d45; border: 1px solid #3b82f6; color: #e2e8f0; border-radius: 8px; padding: 0.6rem 1.25rem; font-size: 0.85rem; z-index: 60; display: none; white-space: nowrap; }
  </style>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(e => console.error('[SW]', e));
      });
    }
  </script>
</head>
<body>
  <header>
    <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
    <div class="header-info">
      <div class="song-title" id="song-title">Cargando...</div>
      <div class="song-artist" id="song-artist"></div>
    </div>
    <button class="add-setlist-btn" onclick="abrirModalSetlist()"><i class="ti ti-plus"></i> Setlist</button>
      <button class="add-setlist-btn" id="save-key-btn" onclick="guardarTonalidad()" style="display:none"><i class="ti ti-device-floppy"></i> Guardar tono</button>
  </header>

  <div class="transpose-bar">
    <span class="t-label">Tono:</span>
    <button class="t-btn" onclick="transpose(-1)"><i class="ti ti-minus"></i></button>
    <div class="key-display" id="key-display">-</div>
    <button class="t-btn" onclick="transpose(1)"><i class="ti ti-plus"></i></button>
    <div class="cifrado-toggle">
      <button class="cifrado-btn active" id="btn-americano" onclick="setCifrado('americano')">Am</button>
      <button class="cifrado-btn" id="btn-nashville" onclick="setCifrado('nashville')">NNS</button>
    </div>
  </div>

  <div class="page active" id="page-1"></div>
  <div class="page" id="page-2"></div>

  <div class="setlist-nav" id="setlist-nav">
    <button class="nav-song-btn prev" id="prev-btn" onclick="irACancion(-1)"><i class="ti ti-arrow-left"></i> Anterior</button>
    <button class="nav-song-btn next" id="next-btn" onclick="irACancion(1)">Siguiente <i class="ti ti-arrow-right"></i></button>
  </div>

  <button class="fab" id="fab" onclick="togglePage()">
    <i class="ti ti-arrow-down" id="fab-icon"></i>
    <span id="fab-text">Siguiente</span>
  </button>
  <div class="page-indicator" id="page-indicator">1 / 2</div>

  <div class="modal-overlay" id="modal-setlist">
    <div class="modal">
      <h3>Agregar a Setlist</h3>
      <div id="setlist-opciones"><div class="loading">Cargando...</div></div>
      <button class="modal-cancel" onclick="cerrarModalSetlist()">Cancelar</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const _supabase = supabase.createClient(
      'https://kzqnsbztfyhyyageuboz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6cW5zYnp0ZnloeXlhZ2V1Ym96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTgzOTQsImV4cCI6MjA5MTQ5NDM5NH0.n0scEJcx6tZ7IihDKxdr3R2LDipZhv2oDbxwLiLq53w'
    )

    const NOTAS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']
    const BEMOLES = {'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#'}
    const CALIDAD = ['','m','m','','','m','dim']
    const PAGE1_TYPES = ['intro','verso','pre-coro']
    const PAGE2_TYPES = ['coro','instrumental','bridge','outro']

    let semitones = 0
    let cifrado = 'americano'
    let originalKey = 'C'
    let sections = []
    let currentPage = 1

    const params = new URLSearchParams(window.location.search)
    const songId = params.get('id')
    const setlistId = params.get('setlist')
    const setlistIndex = parseInt(params.get('index') || '0')
    const setlistSongs = params.get('songs') ? params.get('songs').split(',') : []
    let keyParam = params.get('key') || ''
    let keysParam = params.get('keys') || ''
    let setlistItemId = params.get('itemid') || ''
    let itemIdsParam = params.get('itemids') || ''

function goBack() {
        if (setlistId) {
          window.location.replace('/setlist-view.html?id=' + setlistId)
        } else {
          window.location.replace('/library.html')
        }
      }

    function irACancion(direction) {
      const newIndex  = setlistIndex + direction
      if (newIndex < 0 || newIndex >= setlistSongs.length) return
      const newSongId = setlistSongs[newIndex]
      const keysArr   = keysParam ? keysParam.split(',') : []
      const newKey    = keysArr[newIndex] || ''
      const itemsArr  = itemIdsParam ? itemIdsParam.split(',') : []
      const newItemId = itemsArr[newIndex] || ''
      window.location.href = '/song.html?id=' + newSongId + '&setlist=' + setlistId + '&index=' + newIndex + '&songs=' + setlistSongs.join(',') + '&itemids=' + encodeURIComponent(itemIdsParam) + '&itemid=' + encodeURIComponent(newItemId) + '&keys=' + encodeURIComponent(keysParam) + '&key=' + encodeURIComponent(newKey)
    }

    function traducirAcorde(acorde) {
      const match = acorde.match(/^(#?)(\d)(m?)(sus\d*|add\d*|maj\d*|dim|aug|\d*)?(\/.+)?$/)
      if (!match) return acorde
      const sharp = match[1]
      const grado = parseInt(match[2])
      const menor = match[3]
      const extra = (match[4] || '') + (match[5] || '')
      if (cifrado === 'nashville') return acorde
      const intervalos = [0,2,4,5,7,9,11]
      const rootIdx = NOTAS.indexOf(originalKey)
      let intervalo = intervalos[grado - 1] || 0
      if (sharp) intervalo += 1
      const idx = (rootIdx + intervalo + semitones + 120) % 12
      const nota = NOTAS[idx]
      const calidad = menor ? 'm' : CALIDAD[grado - 1] || ''
      return nota + calidad + extra
    }

    function styledChord(chord) {
  if (!chord || !chord.trim()) return '';
  var t = chord.trim();
  // NNS: optional b/# accidental + digit 1-7 + everything else
  var nns = t.match(/^([b#]?[1-7])(.+)$/);
  if (nns) {
    return '<span class="chord-root">' + nns[1] + '<span class="chord-qual">' + nns[2] + '</span></span>';
  }
  // NNS: plain digit with no suffix
  if (/^[b#]?[1-7]$/.test(t)) return '<span>' + t + '</span>';
  // American: root note (letter + optional # or b) + suffix
  var am = t.match(/^([A-G][#b]?)(.+)$/);
  if (am) {
    return '<span class="chord-root">' + am[1] + '<span class="chord-qual">' + am[2] + '</span></span>';
  }
  // American: plain note no suffix
  return '<span>' + t + '</span>';
}
function procesarLinea(line) {
      if (!line.includes('[')) {
        return `<div class="line"><div class="lyrics">${line}</div></div>`
      }
      if (line.match(/^\[[^\]]+\]$/)) {
        const inner = line.slice(1, -1)
        const acordes = inner.split(/\s+/).map(traducirAcorde).map(styledChord).join('   ')
        return `<div class="line"><div class="chords">${acordes}</div></div>`
      }
      const parts = line.split(/(\[[^\]]+\])/)
      let cells = []
      let pendingChord = null
      parts.forEach(part => {
        if (part.startsWith('[') && part.endsWith(']')) {
          pendingChord = traducirAcorde(part.slice(1,-1).trim())
        } else {
          const words = part.split(/(\s+)/)
          words.forEach((word, i) => {
            if (i === 0 && pendingChord !== null) {
              cells.push({ chord: pendingChord, lyric: word })
              pendingChord = null
            } else {
              cells.push({ chord: '', lyric: word })
            }
          })
        }
      })
      const html = cells.map(c =>
        `<span style="display:inline-block;vertical-align:bottom;text-align:left;margin-right:0.25em">` +
        `<span style="display:block;font-family:monospace;font-size:1rem;font-weight:700;color:#facc15;min-height:1.3em;white-space:pre">${c.chord ? styledChord(c.chord) + ' ' : ' '.repeat((c.lyric||'').length || 1)}</span>` +
        `<span style="display:block;font-size:0.95rem;color:#cbd5e1;white-space:pre">${c.lyric}</span>` +
        `</span>`
      ).join('')
      return `<div class="line" style="line-height:1;margin-bottom:0.75rem">${html}</div>`
    }

    function renderSeccion(sec) {
      const lines = (sec.content || '').split('\n').filter(l => l.trim())
      const linesHTML = lines.map(procesarLinea).join('')
      const tipo = sec.type.toLowerCase().replace(' ', '-')
      return `<div class="section ${tipo}"><div class="section-label">${sec.type}</div>${linesHTML}</div>`
    }

    function renderAll() {
      const page1 = document.getElementById('page-1')
      const page2 = document.getElementById('page-2')
      const secs1 = sections.filter(s => PAGE1_TYPES.includes(s.type.toLowerCase()))
      const secs2 = sections.filter(s => PAGE2_TYPES.includes(s.type.toLowerCase()))
      page1.innerHTML = secs1.length ? secs1.map(renderSeccion).join('') : '<div class="loading">Sin secciones.</div>'
      page2.innerHTML = secs2.length ? secs2.map(renderSeccion).join('') : '<div class="loading">Sin secciones.</div>'
    }

    function transpose(n) {
      semitones = (semitones + n + 12) % 12
      const rootIdx = NOTAS.indexOf(originalKey)
      const newIdx = (rootIdx + semitones) % 12
      document.getElementById('key-display').textContent = NOTAS[newIdx]
      renderAll()
            if (setlistId) { const btn = document.getElementById('save-key-btn'); if (btn) btn.style.display = 'flex' }
    }

    function setCifrado(tipo) {
      cifrado = tipo
      document.getElementById('btn-americano').classList.toggle('active', tipo === 'americano')
      document.getElementById('btn-nashville').classList.toggle('active', tipo === 'nashville')
      renderAll()
    }

    function togglePage() {
      currentPage = currentPage === 1 ? 2 : 1
      document.getElementById('page-1').classList.toggle('active', currentPage === 1)
      document.getElementById('page-2').classList.toggle('active', currentPage === 2)
      document.getElementById('fab-icon').className = currentPage === 1 ? 'ti ti-arrow-down' : 'ti ti-arrow-up'
      document.getElementById('fab-text').textContent = currentPage === 1 ? 'Siguiente' : 'Anterior'
      document.getElementById('page-indicator').textContent = `${currentPage} / 2`
      window.scrollTo(0, 0)
    }

    async function init() {
      const { data: { session } } = await _supabase.auth.getSession()
      if (!session) { window.location.href = '/login.html'; return }
      const { data: song } = await _supabase.from('Songs').select('*').eq('id', songId).single()
      if (!song) {
        document.getElementById('song-title').textContent = 'No se pudo cargar la canción'
        return
      }
      document.getElementById('song-title').textContent = song.title
      document.getElementById('song-artist').textContent = song.artist || ''
      document.title = song.title
      const rawKey = song['original key'] || 'C'
      originalKey = BEMOLES[rawKey] || rawKey
      document.getElementById('key-display').textContent = rawKey
            if (keyParam && NOTAS.includes(keyParam)) {
                      const targetIdx = NOTAS.indexOf(keyParam)
                      const originIdx = NOTAS.indexOf(originalKey)
                      semitones = (targetIdx - originIdx + 12) % 12
                      document.getElementById('key-display').textContent = keyParam
            }
      // Si ya tiene tono guardado, mostrar botón para poder cambiarlo
      if (setlistId && keyParam) { const btn = document.getElementById('save-key-btn'); if (btn) btn.style.display = 'flex' }
      const { data: secs } = await _supabase.from('sections').select('*').eq('song_id', songId).order('order')
      sections = secs || []
      renderAll()
      if (setlistSongs.length > 0) {
        document.getElementById('setlist-nav').classList.add('show')
        if (setlistIndex === 0) document.getElementById('prev-btn').style.visibility = 'hidden'
        if (setlistIndex === setlistSongs.length - 1) document.getElementById('next-btn').style.visibility = 'hidden'
      }
    }

    async function abrirModalSetlist() {
      document.getElementById('modal-setlist').classList.add('show')
      const { data: { session } } = await _supabase.auth.getSession()
      const { data: setlists } = await _supabase.from('setlist').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false })
      const container = document.getElementById('setlist-opciones')
      if (!setlists || setlists.length === 0) {
        container.innerHTML = '<div style="color:#4a5568;font-size:0.85rem;text-align:center;padding:1rem">No tienes setlists. <a href="/setlist.html" style="color:#3b82f6">Crea uno primero.</a></div>'
        return
      }
      container.innerHTML = setlists.map(s => `
        <div class="setlist-opcion" onclick="agregarASetlist(${s.id}, '${s.name}')">
          <div><div class="opcion-name">${s.name}</div>${s.date ? `<div class="opcion-date">${new Date(s.date).toLocaleDateString('es-MX', {weekday:'long', day:'numeric', month:'long'})}</div>` : ''}</div>
          <i class="ti ti-plus opcion-add"></i>
        </div>`).join('')
    }

    function cerrarModalSetlist() {
      document.getElementById('modal-setlist').classList.remove('show')
    }

    async function agregarASetlist(setlistId, setlistName) {
      const { data: existing } = await _supabase.from('setlist_songs').select('id').eq('setlist_id', setlistId).eq('song_id', songId)
      if (existing && existing.length > 0) { mostrarToast('Ya está en este setlist'); cerrarModalSetlist(); return }
      const { data: songs } = await _supabase.from('setlist_songs').select('order').eq('setlist_id', setlistId).order('order', { ascending: false }).limit(1)
      const nextOrder = songs && songs.length > 0 ? songs[0].order + 1 : 1
      const { error } = await _supabase.from('setlist_songs').insert({ setlist_id: setlistId, song_id: parseInt(songId), order: nextOrder })
      if (error) { mostrarToast('Error al agregar') } else { mostrarToast(`✓ Agregado a "${setlistName}"`); cerrarModalSetlist() }
    }

    async function guardarTonalidad() {
      if (!setlistId || !songId) return
      const rootIdx    = NOTAS.indexOf(originalKey)
      const currentKey = NOTAS[(rootIdx + semitones + 12) % 12]

      // UPDATE bloqueado por RLS — usar DELETE + INSERT
      // Primero leer el registro actual para obtener setlist_id, song_id, order
      let setlistIdNum = parseInt(setlistId)
      let songIdNum    = parseInt(songId)
      let currentItemId = setlistItemId ? parseInt(setlistItemId) : null

      let currentRecord = null
      if (currentItemId) {
        const { data: rec } = await _supabase.from('setlist_songs').select('*').eq('id', currentItemId).single()
        currentRecord = rec
      } else {
        const { data: rec } = await _supabase.from('setlist_songs').select('*').eq('setlist_id', setlistIdNum).eq('song_id', songIdNum).single()
        currentRecord = rec
      }

      if (!currentRecord) {
        mostrarToast('Error: registro no encontrado')
        return
      }

      // DELETE el registro actual
      await _supabase.from('setlist_songs').delete().eq('id', currentRecord.id)

      // INSERT nuevo registro con key_override
      const { data: inserted, error } = await _supabase.from('setlist_songs').insert({
        setlist_id:   currentRecord.setlist_id,
        song_id:      currentRecord.song_id,
        order:        currentRecord.order,
        key_override: currentKey
      }).select().single()

      if (error) {
        mostrarToast('Error al guardar: ' + error.message)
      } else {
        mostrarToast('Tonalidad ' + currentKey + ' guardada')
        // Actualizar setlistItemId con el nuevo id del registro insertado
        setlistItemId = String(inserted.id)
        // Actualizar itemIdsParam con el nuevo id
        const itemsArr = itemIdsParam ? itemIdsParam.split(',') : setlistSongs.map(() => '')
        itemsArr[setlistIndex] = String(inserted.id)
        itemIdsParam = itemsArr.join(',')
        // Actualizar keys en memoria
        const keysArr = keysParam ? keysParam.split(',') : setlistSongs.map(() => '')
        keysArr[setlistIndex] = currentKey
        const newKeys = keysArr.join(',')
        keysParam = newKeys
        keyParam  = currentKey
        const newUrl = '/song.html?id=' + songId + '&setlist=' + setlistId + '&index=' + setlistIndex + '&songs=' + setlistSongs.join(',') + '&itemids=' + encodeURIComponent(itemIdsParam) + '&itemid=' + encodeURIComponent(setlistItemId) + '&keys=' + encodeURIComponent(newKeys) + '&key=' + encodeURIComponent(currentKey)
        history.replaceState(null, '', newUrl)
      }
    }

    function mostrarToast(msg) {
      const toast = document.getElementById('toast')
      toast.textContent = msg
      toast.style.display = 'block'
      setTimeout(() => { toast.style.display = 'none' }, 2500)
    }

    init()
  </script>
</body>
</html>
