<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CQM - Nueva Contraseña</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .logo { font-size: 2rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 0.25rem; }
    .logo span { color: #f59e0b; }
    .tagline { font-size: 0.85rem; color: #888; margin-bottom: 2.5rem; }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }
    .card h2 { font-size: 1.2rem; margin-bottom: 1.5rem; font-weight: 600; }
    .input-group { margin-bottom: 1rem; }
    .input-group label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 0.4rem; }
    .input-group input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: #f59e0b; }
    .btn {
      width: 100%;
      background: #f59e0b;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .btn:disabled { background: #555; cursor: not-allowed; }
    .mensaje {
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      text-align: center;
    }
    .error { background: #3a1a1a; border: 1px solid #f87171; color: #f87171; }
    .success { background: #1a3a1a; border: 1px solid #4ade80; color: #4ade80; }
  </style>
</head>
<body>
  <div class="logo">Chart<span>Quick</span></div>
  <p class="tagline">by Musishens</p>
  <div class="card">
    <h2>Nueva contraseña</h2>
    <div class="mensaje error" id="error"></div>
    <div class="mensaje success" id="success"></div>
    <div class="input-group">
      <label>Nueva contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="input-group">
      <label>Confirmar contraseña</label>
      <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn" id="btn">Guardar contraseña</button>
  </div>

  <script>
    const _supabase = supabase.createClient('https://kzqnsbztfyhyyageuboz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6cW5zYnp0ZnloeXlhZ2V1Ym96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTgzOTQsImV4cCI6MjA5MTQ5NDM5NH0.n0scEJcx6tZ7IihDKxdr3R2LDipZhv2oDbxwLiLq53w')

    document.getElementById('btn').addEventListener('click', async function() {
      const password = document.getElementById('password').value.trim()
      const confirm = document.getElementById('confirm').value.trim()
      const errorEl = document.getElementById('error')
      const successEl = document.getElementById('success')
      const btn = document.getElementById('btn')

      errorEl.style.display = 'none'
      successEl.style.display = 'none'

      if (!password || !confirm) {
        errorEl.textContent = 'Por favor llena todos los campos.'
        errorEl.style.display = 'block'
        return
      }

      if (password !== confirm) {
        errorEl.textContent = 'Las contraseñas no coinciden.'
        errorEl.style.display = 'block'
        return
      }

      if (password.length < 6) {
        errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres.'
        errorEl.style.display = 'block'
        return
      }

      btn.disabled = true
      btn.textContent = 'Guardando...'

      const { error } = await _supabase.auth.updateUser({ password })

      if (error) {
        errorEl.textContent = error.message
        errorEl.style.display = 'block'
      } else {
        successEl.textContent = '¡Contraseña actualizada! Redirigiendo...'
        successEl.style.display = 'block'
        setTimeout(() => { window.location.href = '/login.html' }, 2000)
      }

      btn.disabled = false
      btn.textContent = 'Guardar contraseña'
    })
  </script>
</body>
</html>
