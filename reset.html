<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#080c14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CQM">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>CQM - Nueva Contraseña</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080c14;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    header {
      background: #0d1626;
      border-bottom: 1px solid #1e2d45;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-btn {
      background: none;
      border: none;
      color: #3b82f6;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .header-title { font-size: 1rem; font-weight: 600; color: #e2e8f0; }
    .container {
      padding: 2rem 1.25rem;
      max-width: 480px;
      margin: 0 auto;
    }
    .description {
      font-size: 0.85rem;
      color: #4a5568;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .input-group { margin-bottom: 1rem; }
    .input-group label {
      display: block;
      font-size: 0.75rem;
      color: #4a5568;
      margin-bottom: 0.4rem;
      letter-spacing: 0.5px;
    }
    .input-wrap {
      display: flex;
      align-items: center;
      background: #0d1626;
      border: 1px solid #1e2d45;
      border-radius: 8px;
      padding: 0 1rem;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: #3b82f6; }
    .input-wrap i { color: #4a5568; font-size: 1rem; flex-shrink: 0; }
    .input-wrap input {
      background: none;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 0.75rem 0.5rem;
      flex: 1;
      width: 100%;
    }
    .btn {
      width: 100%;
      background: #3b82f6;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #1e2d45; color: #4a5568; cursor: not-allowed; }
    .mensaje {
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error { background: #1a0808; border: 1px solid #7f1d1d; color: #f87171; }
    .success { background: #0a1a0a; border: 1px solid #14532d; color: #4ade80; }
  </style>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(e => console.error('[SW]', e));
      });
    }
  </script>
</head>
<body>
  <header>
    <button class="back-btn" onclick="history.back()">
      <i class="ti ti-arrow-left"></i>
    </button>
    <div class="header-title">Nueva contraseña</div>
  </header>

  <div class="container">
    <p class="description">Escribe tu nueva contraseña. Debe tener al menos 6 caracteres.</p>

    <div class="mensaje error" id="error"></div>
    <div class="mensaje success" id="success"></div>

    <div class="input-group">
      <label>Nueva contraseña</label>
      <div class="input-wrap">
        <i class="ti ti-lock"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
      </div>
    </div>
    <div class="input-group">
      <label>Confirmar contraseña</label>
      <div class="input-wrap">
        <i class="ti ti-lock-check"></i>
        <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password">
      </div>
    </div>
    <button class="btn" id="btn">Guardar contraseña</button>
  </div>

  <script>
    const _supabase = supabase.createClient(
      'https://kzqnsbztfyhyyageuboz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6cW5zYnp0ZnloeXlhZ2V1Ym96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTgzOTQsImV4cCI6MjA5MTQ5NDM5NH0.n0scEJcx6tZ7IihDKxdr3R2LDipZhv2oDbxwLiLq53w'
    )

    document.getElementById('btn').addEventListener('click', async function() {
      const password = document.getElementById('password').value.trim()
      const confirm = document.getElementById('confirm').value.trim()
      const errorEl = document.getElementById('error')
      const successEl = document.getElementById('success')
      const btn = document.getElementById('btn')

      errorEl.style.display = 'none'
      successEl.style.display = 'none'

      if (!password || !confirm) {
        errorEl.textContent = 'Por favor llena todos los campos.'
        errorEl.style.display = 'block'
        return
      }

      if (password !== confirm) {
        errorEl.textContent = 'Las contraseñas no coinciden.'
        errorEl.style.display = 'block'
        return
      }

      if (password.length < 6) {
        errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres.'
        errorEl.style.display = 'block'
        return
      }

      btn.disabled = true
      btn.textContent = 'Guardando...'

      const { error } = await _supabase.auth.updateUser({ password })

      if (error) {
        errorEl.textContent = error.message
        errorEl.style.display = 'block'
      } else {
        successEl.textContent = '¡Contraseña actualizada! Redirigiendo...'
        successEl.style.display = 'block'
        setTimeout(() => { window.location.href = '/profile.html' }, 2000)
      }

      btn.disabled = false
      btn.textContent = 'Guardar contraseña'
    })
  </script>
</body>
</html>
