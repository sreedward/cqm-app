<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CQM - Iniciar Sesión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 0.25rem;
    }
    .logo span { color: #f59e0b; }
    .tagline {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 2.5rem;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }
    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }
    .input-group {
      margin-bottom: 1rem;
    }
    .input-group label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.4rem;
    }
    .input-group input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: #f59e0b;
    }
    .btn {
      width: 100%;
      background: #f59e0b;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #d97706; }
    .divider {
      text-align: center;
      color: #555;
      font-size: 0.8rem;
      margin: 1rem 0;
    }
    .register {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-top: 1.25rem;
    }
    .register a {
      color: #f59e0b;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="logo">Chart<span>Quick</span></div>
  <p class="tagline">by Musishens</p>
  <div class="card">
    <h2>Iniciar sesión</h2>
    <div class="input-group">
      <label>Correo electrónico</label>
      <input type="email" placeholder="tu@correo.com" id="email">
    </div>
    <div class="input-group">
      <label>Contraseña</label>
      <input type="password" placeholder="••••••••" id="password">
    </div>
    <button class="btn">Entrar</button>
    <div class="register">
      ¿No tienes cuenta? <a href="#">Regístrate</a>
    </div>
  </div>
</body>
</html>
