<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#080c14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CQM">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>CQM - Iniciar Sesión</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080c14;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }
    .logo-wrap { text-align: center; margin-bottom: 2.5rem; }
    .logo { font-size: 2rem; font-weight: 700; letter-spacing: -1px; color: #e2e8f0; }
    .logo span { color: #3b82f6; }
    .tagline { font-size: 0.75rem; color: #4a5568; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
    .card {
      background: #0d1626;
      border: 1px solid #1e2d45;
      border-radius: 16px;
      padding: 1.75rem;
      width: 100%;
      max-width: 380px;
    }
    .card h2 { font-size: 1rem; font-weight: 600; color: #e2e8f0; margin-bottom: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-group label { display: block; font-size: 0.75rem; color: #4a5568; margin-bottom: 0.4rem; letter-spacing: 0.5px; }
    .input-wrap {
      display: flex;
      align-items: center;
      background: #080c14;
      border: 1px solid #1e2d45;
      border-radius: 8px;
      padding: 0 1rem;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: #3b82f6; }
    .input-wrap i { color: #4a5568; font-size: 1rem; flex-shrink: 0; }
    .input-wrap input {
      background: none;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 0.75rem 0.5rem;
      flex: 1;
      width: 100%;
    }
    .btn {
      width: 100%;
      background: #3b82f6;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
      letter-spacing: 0.5px;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #1e2d45; color: #4a5568; cursor: not-allowed; }
    .mensaje {
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error { background: #1a0808; border: 1px solid #7f1d1d; color: #f87171; }
    .success { background: #0a1a0a; border: 1px solid #14532d; color: #4ade80; }
    .toggle { text-align: center; font-size: 0.8rem; color: #4a5568; margin-top: 1.25rem; }
    .toggle a { color: #3b82f6; text-decoration: none; font-weight: 600; cursor: pointer; }
    .forgot { text-align: center; font-size: 0.8rem; margin-top: 0.75rem; }
    .forgot a { color: #4a5568; text-decoration: none; cursor: pointer; }
    .forgot a:hover { color: #3b82f6; }
    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1rem 0; }
    .divider hr { flex: 1; border: none; border-top: 1px solid #1e2d45; }
    .divider span { font-size: 0.7rem; color: #4a5568; }
  </style>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(e => console.error('[SW]', e));
      });
    }
  </script>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo">Chart<span>Quick</span></div>
    <div class="tagline">by Musishens</div>
  </div>

  <div class="card">
    <h2 id="titulo">Iniciar sesión</h2>
    <div class="mensaje error" id="error"></div>
    <div class="mensaje success" id="success"></div>
    <div class="input-group">
      <label>Correo electrónico</label>
      <div class="input-wrap">
        <i class="ti ti-mail"></i>
        <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">
      </div>
    </div>
    <div class="input-group">
      <label>Contraseña</label>
      <div class="input-wrap">
        <i class="ti ti-lock"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>
    <button class="btn" id="btn">Entrar</button>
    <div class="forgot">
      <a id="forgot-link">¿Olvidaste tu contraseña?</a>
    </div>
    <div class="divider"><hr><span>o</span><hr></div>
    <div class="toggle">
      <span id="toggle-texto">¿No tienes cuenta?</span>
      <a id="toggle-link"> Regístrate</a>
    </div>
  </div>

  <script>
    const _supabase = supabase.createClient(
      'https://kzqnsbztfyhyyageuboz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6cW5zYnp0ZnloeXlhZ2V1Ym96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTgzOTQsImV4cCI6MjA5MTQ5NDM5NH0.n0scEJcx6tZ7IihDKxdr3R2LDipZhv2oDbxwLiLq53w'
    )

    let modoRegistro = false

    document.getElementById('toggle-link').addEventListener('click', function() {
      modoRegistro = !modoRegistro
      document.getElementById('titulo').textContent = modoRegistro ? 'Crear cuenta' : 'Iniciar sesión'
      document.getElementById('btn').textContent = modoRegistro ? 'Registrarse' : 'Entrar'
      document.getElementById('toggle-link').textContent = modoRegistro ? ' Inicia sesión' : ' Regístrate'
      document.getElementById('toggle-texto').textContent = modoRegistro ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?'
      document.getElementById('error').style.display = 'none'
      document.getElementById('success').style.display = 'none'
    })

    document.getElementById('forgot-link').addEventListener('click', async function() {
      const email = document.getElementById('email').value.trim()
      const errorEl = document.getElementById('error')
      const successEl = document.getElementById('success')
      errorEl.style.display = 'none'
      successEl.style.display = 'none'
      if (!email) {
        errorEl.textContent = 'Escribe tu correo arriba primero.'
        errorEl.style.display = 'block'
        return
      }
      const { error } = await _supabase.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://cqm-app.vercel.app/reset.html'
      })
      if (error) {
        errorEl.textContent = error.message
        errorEl.style.display = 'block'
      } else {
        successEl.textContent = '¡Revisa tu correo! Te enviamos un enlace para restablecer tu contraseña.'
        successEl.style.display = 'block'
      }
    })

    document.getElementById('btn').addEventListener('click', async function() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value.trim()
      const errorEl = document.getElementById('error')
      const successEl = document.getElementById('success')
      const btn = document.getElementById('btn')

      errorEl.style.display = 'none'
      successEl.style.display = 'none'

      if (!email || !password) {
        errorEl.textContent = 'Por favor llena todos los campos.'
        errorEl.style.display = 'block'
        return
      }

      btn.disabled = true
      btn.textContent = 'Cargando...'

      if (modoRegistro) {
        const { error } = await _supabase.auth.signUp({ email, password })
        if (error) {
          errorEl.textContent = error.message
          errorEl.style.display = 'block'
        } else {
          successEl.textContent = '¡Cuenta creada! Revisa tu correo para confirmar.'
          successEl.style.display = 'block'
        }
      } else {
        const { error } = await _supabase.auth.signInWithPassword({ email, password })
        if (error) {
          errorEl.textContent = 'Correo o contraseña incorrectos.'
          errorEl.style.display = 'block'
        } else {
          window.location.href = '/library.html'
        }
      }

      btn.disabled = false
      btn.textContent = modoRegistro ? 'Registrarse' : 'Entrar'
    })

    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('btn').click()
    })
  </script>
</body>
</html>
